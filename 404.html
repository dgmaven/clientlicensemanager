<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 - Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --primary: #ffffff;
      --text-muted: #88888b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .glitch-container {
      position: relative;
    }
    h1 {
      font-size: 12rem;
      font-weight: 600;
      letter-spacing: -5px;
      margin-bottom: 0;
      line-height: 1;
      opacity: 0.1;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
    }
    h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 400px;
      margin: 0 auto 30px;
    }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255,255,255,0.1);
    }
    .circles {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      animation: float 20s infinite linear;
    }
    @keyframes float {
      from { transform: translateY(0) rotate(0deg); }
      to { transform: translateY(-100vh) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="circles">
    <div class="circle" style="width: 80px; height: 80px; left: 10%; animation-duration: 15s;"></div>
    <div class="circle" style="width: 120px; height: 120px; left: 70%; animation-delay: 2s;"></div>
    <div class="circle" style="width: 50px; height: 50px; left: 40%; animation-delay: 5s;"></div>
  </div>

  <div class="glitch-container">
    <h1>404</h1>
    <div class="content">
      <h2>Lost in space?</h2>
      <p>The page you are looking for does not exist or has been moved to another dimension.</p>
      <a href="index.html" class="btn">Back to Safety</a>
    </div>
  </div>
</body>
</html>
