<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>License Activation - License Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
    .header p { color: #94a3b8; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 500; color: #cbd5e1; }
    input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; }
    input:focus { outline: none; border-color: #6366f1; }
    .btn { width: 100%; padding: 14px; background: #6366f1; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .error { color: #f87171; background: rgba(248, 113, 113, 0.1); padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(248, 113, 113, 0.2); }
  </style>
</head>
<body>

  <div id="app" class="card">
    <div class="header">
      <div style="font-size: 40px; margin-bottom: 10px;">🚀</div>
      <h1>License Activation</h1>
      <p>Activate your system using your license key.</p>
    </div>

    <div v-if="error" class="error">{{ error }}</div>

    <form @submit.prevent="activateSystem">
      <div class="form-group">
        <label>Google Apps Script URL</label>
        <input type="url" v-model="form.webUrl" required placeholder="https://script.google.com/macros/s/.../exec">
      </div>

      <div class="form-group">
        <label>License Key</label>
        <input type="text" v-model="form.licenseKey" required placeholder="XXXX-XXXX-XXXX-XXXX">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" v-model="form.email" required placeholder="Enter the email used for purchase">
      </div>

      <div class="form-group">
        <label>Set Admin Password</label>
        <input type="password" v-model="form.password" required placeholder="Choose a password for your dashboard">
      </div>

      <button type="submit" class="btn" :disabled="loading">
        {{ loading ? 'Activating System...' : 'Activate & Initialize' }}
      </button>
    </form>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="js/config.js?v=1.0.3"></script>
  <script src="js/utils.js?v=1.0.3"></script>
  
  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const loading = ref(false);
        const error = ref('');
        const form = ref({ webUrl: '', licenseKey: '', email: '', password: '' });
        
        // Read reason from URL if redirected
        const urlParams = new URLSearchParams(window.location.search);
        const reason = urlParams.get('reason');
        if (reason) {
          error.value = "⚠️ " + reason + ". Please activate your system to continue.";
        }

        const activateSystem = async () => {
          loading.value = true;
          error.value = '';
          
          try {
            const res = await Utils.callApi("activateLicense", {
                licenseKey: form.value.licenseKey,
                email: form.value.email,
                password: form.value.password,
                webUrl: form.value.webUrl, // Include this for recording
                domain: window.location.hostname
            }, form.value.webUrl);

            if (res.status === "success") {
                localStorage.setItem('SYSTEM_WEB_URL', form.value.webUrl);
                window.location.href = "login.html?activated=true";
            } else {
                error.value = res.message || "Activation failed.";
            }
          } catch(e) {
            error.value = "Connection failed. Please check your Script URL.";
          } finally {
            loading.value = false;
          }
        };

        return { form, loading, error, activateSystem };
      }
    }).mount('#app');
  </script>
</body>
</html>
