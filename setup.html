<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Master Setup - License Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffffff;
      --primary-hover: #e4e4e7;
      --bg-dark: #09090b;
      --surface: #18181b;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --success: #10b981;
      --border: #27272a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

    body {
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .header { text-align: center; margin-bottom: 32px; }
    .header .icon { font-size: 40px; margin-bottom: 15px; }
    .header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.5px; }
    .header p { color: var(--text-muted); font-size: 0.95rem; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
    
    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      transition: all 0.2s ease;
      outline: none;
    }
    .form-control:focus { border-color: var(--text-muted); }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: var(--bg-dark); }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert { padding: 14px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid transparent; }
    .alert-error { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #fca5a5; }
    .alert-success { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
    
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 50%;
      border-top-color: var(--bg-dark);
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="app" class="setup-card" v-cloak>
    <div class="header">
      <div class="icon">👑</div>
      <h1>Master Setup</h1>
      <p>Provision your Master License Platform in one click.</p>
    </div>

    <div v-if="message" :class="['alert', isError ? 'alert-error' : 'alert-success']">
      {{ message }}
    </div>

    <form @submit.prevent="runBootstrap">
      <div class="form-group">
        <label class="form-label">Google Apps Script WEB URL</label>
        <input type="url" class="form-control" v-model="form.webUrl" required placeholder="https://script.google.com/macros/s/.../exec" :disabled="loading">
      </div>

      <div class="form-group">
        <label class="form-label">Master Bootstrap Password</label>
        <input type="password" class="form-control" v-model="form.password" required placeholder="Enter the password from code.js" :disabled="loading">
      </div>

      <div class="form-group">
        <label class="form-label">Admin Email (M-000)</label>
        <input type="email" class="form-control" v-model="form.email" required placeholder="admin@master.com" :disabled="loading">
      </div>

      <div class="form-group">
        <label class="form-label">Platform Branding Name</label>
        <input type="text" class="form-control" v-model="form.systemName" placeholder="My License Platform" :disabled="loading">
      </div>

      <button type="submit" class="btn btn-primary" :disabled="loading">
        <div v-if="loading" class="spinner"></div>
        {{ loading ? 'Provisioning...' : 'Bootstrap System' }}
      </button>
    </form>
    
    <div v-if="!isError && message" style="margin-top: 20px; text-align: center;">
        <a href="login.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Proceed to Login →</a>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  
  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const loading = ref(false);
        const message = ref('');
        const isError = ref(false);
        const form = ref({ 
          webUrl: CONFIG.WEB_URL,
          password: '',
          email: '',
          systemName: ''
        });

        const runBootstrap = async () => {
          loading.value = true;
          message.value = '';
          
          try {
            const res = await Utils.callApi("bootstrap", {
                password: form.value.password,
                email: form.value.email,
                systemName: form.value.systemName
            }, form.value.webUrl);

            if (res.status === "success") {
                localStorage.setItem('SYSTEM_WEB_URL', form.value.webUrl);
                message.value = res.message + " Redirecting to login...";
                isError.value = false;
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
            } else {
                message.value = res.message;
                isError.value = true;
            }
          } catch(e) {
            message.value = "Failed to connect. Ensure your GAS URL is correct and deployed as 'Anyone'.";
            isError.value = true;
          } finally {
            loading.value = false;
          }
        };

        return { form, loading, message, isError, runBootstrap };
      }
    }).mount('#app');
  </script>
</body>
</html>
